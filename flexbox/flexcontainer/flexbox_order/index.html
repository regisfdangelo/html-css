<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container{           
            display: flex;                  
            flex-flow: row wrap;                             
            background-color: lightsalmon;
            
        }       
        .itemA{                       
            background-color: lightseagreen;
            text-align: center;           
            padding: 10px;            
            border: 1px solid black;
            order: 7;            
        }
        .itemB{                       
            background-color: lightseagreen;
            text-align: center;           
            padding: 10px;            
            border: 1px solid black;
            order: 6;            
        }
        .itemC{                       
            background-color: lightseagreen;
            text-align: center;           
            padding: 10px;            
            border: 1px solid black;
            order: 5;            
        }
        .itemD{                       
            background-color: lightseagreen;
            text-align: center;           
            padding: 10px;            
            border: 1px solid black;
            order: 4;            
        }
        .itemE{                       
            background-color: lightseagreen;
            text-align: center;           
            padding: 10px;            
            border: 1px solid black;
            order: 3;            
        }
        .itemF{                       
            background-color: lightseagreen;
            text-align: center;           
            padding: 10px;            
            border: 1px solid black;
            order: 2;            
        }
        .itemG{                       
            background-color: lightseagreen;
            text-align: center;           
            padding: 10px;            
            border: 1px solid black;
            order: 1;           
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="itemA">A</div> 
        <div class="itemB">B</div> 
        <div class="itemC">C</div>
        <div class="itemD">D</div>
        <div class="itemE">E</div>
        <div class="itemF">F</div>
        <div class="itemG">G</div>                         
    </div>
    
</body>
</html>
